<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loop Library — layout mockups</title>
<style>
  :root{
    --bg:#0f1115; --panel:#161a22; --panel2:#1d2230; --line:#2a3142;
    --ink:#e7ecf3; --dim:#9aa6b8; --accent:#6ea8fe; --accent2:#7ee0c0;
    --A:#7ee0c0; --B:#ffd479; --C:#ff9b9b; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  a{color:var(--accent)}
  /* top tab switcher */
  .switch{position:sticky;top:0;z-index:50;display:flex;gap:6px;padding:10px 14px;background:#0b0d11;border-bottom:1px solid var(--line)}
  .switch button{flex:0 0 auto;padding:8px 14px;border:1px solid var(--line);background:var(--panel);color:var(--dim);border-radius:8px;cursor:pointer;font-weight:600}
  .switch button.on{background:var(--accent);color:#08101f;border-color:var(--accent)}
  .switch .hint{margin-left:auto;color:var(--dim);font-size:13px;align-self:center}
  .view{display:none}
  .view.on{display:block}
  .wrap{max-width:1080px;margin:0 auto;padding:22px 16px 80px}
  h1{font-size:22px;margin:.2em 0}
  .sub{color:var(--dim);margin:0 0 16px}
  .tier{font:600 11px/1 var(--mono);padding:3px 6px;border-radius:5px;color:#08101f}
  .tier.A{background:var(--A)} .tier.B{background:var(--B)} .tier.C{background:var(--C)}
  .chip{font-size:11px;color:var(--dim);border:1px solid var(--line);border-radius:20px;padding:2px 9px;white-space:nowrap}
  .chip.uatt{color:var(--accent2);border-color:#2f5648}
  pre.cmd{font:13px/1.5 var(--mono);background:#0b0d11;border:1px solid var(--line);border-radius:8px;padding:12px;margin:10px 0;white-space:pre-wrap;word-break:break-word;color:#d6e2f5}
  .copy{cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600}
  .copy:hover{border-color:var(--accent)}
  .copy.done{background:var(--accent2);color:#08101f;border-color:var(--accent2)}
  .note{font-size:12.5px;color:var(--dim);margin-top:6px}
  details.how{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px 14px;margin-bottom:18px}
  details.how summary{cursor:pointer;font-weight:600;padding:8px 0}
  details.how table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
  details.how td,details.how th{border:1px solid var(--line);padding:6px 8px;text-align:left}
  /* toolbar / filters */
  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
  .bar input[type=search]{flex:1 1 220px;min-width:160px;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 11px;font-size:14px}
  .flt{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--dim);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600}
  .flt.on{background:var(--accent);color:#08101f;border-color:var(--accent)}
  .flt.on.A{background:var(--A)} .flt.on.B{background:var(--B)} .flt.on.C{background:var(--C)}

  /* ---- A: card grid ---- */
  .cat-h{margin:22px 0 10px;font-size:15px;color:var(--accent2);letter-spacing:.02em;border-bottom:1px solid var(--line);padding-bottom:6px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 14px;display:flex;flex-direction:column}
  .card .top{display:flex;align-items:center;gap:8px;margin-bottom:2px}
  .card .id{font:600 12px var(--mono);color:var(--dim)}
  .card .nm{font-weight:600}
  .card .meta{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 0}
  .card pre.cmd{flex:1}
  .card .foot{display:flex;justify-content:flex-end}

  /* ---- B: sidebar explorer ---- */
  .ex{display:grid;grid-template-columns:260px 1fr;gap:0;min-height:70vh;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .ex .side{background:var(--panel);border-right:1px solid var(--line);overflow:auto;max-height:78vh}
  .ex .side input{width:100%;background:var(--panel2);border:0;border-bottom:1px solid var(--line);color:var(--ink);padding:11px;font-size:13px}
  .ex .grp{font:600 11px var(--mono);color:var(--accent2);padding:12px 12px 4px;text-transform:uppercase;letter-spacing:.04em}
  .ex .item{padding:7px 12px;cursor:pointer;font-size:13.5px;display:flex;gap:7px;align-items:center;border-left:3px solid transparent}
  .ex .item:hover{background:var(--panel2)}
  .ex .item.on{background:var(--panel2);border-left-color:var(--accent)}
  .ex .item .id{font:600 11px var(--mono);color:var(--dim)}
  .ex .main{padding:24px 26px;overflow:auto;max-height:78vh}
  .ex .main h2{margin:.1em 0;font-size:21px}
  .ex .main .meta{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}

  /* ---- C: accordion ---- */
  .col{max-width:760px;margin:0 auto}
  .acc-h{margin:24px 0 8px;font-size:14px;color:var(--accent2);letter-spacing:.03em}
  details.row{border:1px solid var(--line);border-radius:9px;margin:7px 0;background:var(--panel);overflow:hidden}
  details.row>summary{cursor:pointer;list-style:none;padding:11px 14px;display:flex;align-items:center;gap:9px}
  details.row>summary::-webkit-details-marker{display:none}
  details.row>summary .id{font:600 12px var(--mono);color:var(--dim)}
  details.row>summary .nm{font-weight:600;flex:1}
  details.row>summary .caret{color:var(--dim);transition:.15s}
  details.row[open]>summary .caret{transform:rotate(90deg)}
  details.row .body{padding:0 14px 14px}
  .hidden{display:none!important}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent2);color:#08101f;font-weight:600;padding:9px 16px;border-radius:8px;opacity:0;transition:.2s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>

<div class="switch">
  <button data-tab="A" class="on">A · Card grid</button>
  <button data-tab="B">B · Sidebar explorer</button>
  <button data-tab="C">C · Accordion</button>
  <span class="hint">Same data, three layouts — switch to compare. Copy buttons are live.</span>
</div>

<section id="A" class="view on"></section>
<section id="B" class="view"></section>
<section id="C" class="view"></section>

<div class="toast" id="toast">Copied!</div>

<script>
const CATS = ["Docs & Comms","Testing & Quality","Performance","Production & Ops","Repo & Release Hygiene","Discovery & Visual"];
const LOOPS = [
 {id:"001",name:"Overnight Docs Sweep",cat:"Docs & Comms",tier:"B",mode:"1d",uatt:true,
  prompt:"/loop 1d Review the codebase for documentation that no longer matches recent code changes. Update the affected docs, then open a pull request. Stop when the documentation matches the current implementation.",
  note:"Nightly job → run via Routines so it fires without an open session."},
 {id:"008",name:"Nightly Changelog",cat:"Docs & Comms",tier:"B",mode:"1d",uatt:true,
  prompt:"/loop 1d Review the previous day's code changes. For each user-relevant change, add an entry to CHANGELOG.md. Stop when every user-relevant change from the previous day is accounted for.",
  note:"Nightly → Routines."},
 {id:"018",name:"Product Update Podcast",cat:"Docs & Comms",tier:"C",mode:"1d",uatt:true,
  prompt:"/loop 1d Identify meaningful product changes from the last day and generate a 3–5 minute podcast episode explaining the new features to users. Verify the script against the source material for accuracy.",
  note:"Needs an audio-generation tool/MCP. Nightly → Routines."},

 {id:"005",name:"100% Test Coverage",cat:"Testing & Quality",tier:"B",mode:"self",uatt:false,
  prompt:"/loop Run the coverage report. Find the largest gap, add tests for it, and re-run. Treat the coverage report as the source of truth. Stop when coverage reaches 100%.",
  note:""},
 {id:"009",name:"Quality Streak",cat:"Testing & Quality",tier:"C",mode:"self",uatt:false,
  prompt:"/loop Run a realistic end-to-end scenario. If it fails, document the failure and add a regression test that guards against it. Stop after [N] consecutive successful scenarios.",
  note:"Fill [N]."},
 {id:"010",name:"Full Product Evaluation",cat:"Testing & Quality",tier:"C",mode:"self",uatt:false,
  prompt:"/loop Create and run [N] realistic scenarios covering all major capabilities, each with defined success criteria. Fix any failures and re-run the affected scenarios. Stop when every scenario meets the defined quality bar.",
  note:"Fill [N]."},
 {id:"011",name:"Test-Suite Speed",cat:"Testing & Quality",tier:"B",mode:"self",uatt:false,
  prompt:"/loop Profile the test suite for the slowest tests, speed them up without reducing coverage or changing behavior, and re-time the suite. Stop when it is meaningfully faster with no coverage or behavior regression.",
  note:""},
 {id:"019",name:"Clodex Adversarial-Review",cat:"Testing & Quality",tier:"C",mode:"self",uatt:false,
  prompt:"/loop Run a Clodex adversarial code review on the current pull request at severity threshold [LEVEL]. Fix every finding at or above the threshold and re-run. Stop when the pull request reaches the configured review bar.",
  note:"Needs the Clodex review tool + a [LEVEL]."},

 {id:"003",name:"Sub-50ms Page-Load",cat:"Performance",tier:"B",mode:"self",uatt:false,
  prompt:"/loop Measure page load times under consistent, repeatable conditions. Find the slowest path, optimize it, and re-measure — no regressions. Stop when every page loads in under 50ms.",
  note:""},
 {id:"015",name:"Post-Release Baseline",cat:"Performance",tier:"B",mode:"1d",uatt:true,
  prompt:"/loop 1d Run the standard benchmark suite and record the results as the new baseline, including revision, environment, and test conditions.",
  note:"Better as an event trigger: fire after each release (Routine on a GitHub release event)."},

 {id:"004",name:"Production Error Sweep",cat:"Production & Ops",tier:"C",mode:"30m",uatt:true,
  prompt:"/loop 30m Review production logs for actionable errors. For each, trace the root cause, apply a fix, and post a summary to Slack with links to the PRs. Stop when the errors are fixed or the logs are clean.",
  note:"Needs prod log access + Slack. Monitoring runs when you're away → Routines."},
 {id:"007",name:"Logging Coverage",cat:"Production & Ops",tier:"B",mode:"self",uatt:false,
  prompt:"/loop Identify important code paths that lack logging. Add useful, tested log statements one path at a time and verify them. Stop when every important path emits useful, tested logs.",
  note:""},
 {id:"014",name:"Production Data Cleanup",cat:"Production & Ops",tier:"C",mode:"self",uatt:false,
  prompt:"/loop Review production records against the allowed definition. Remove invalid records and improve the classification logic that let them through. Stop when every remaining record meets the allowed definition.",
  note:"Needs access to the production datastore."},
 {id:"017",name:"Customer AI Deployment",cat:"Production & Ops",tier:"C",mode:"self",uatt:false,
  prompt:"/loop For customer workflow [NAME], define the business goal, build or update the deployment, run a dry run, then monitor production. Produce a customer-facing update and reusable lessons. Stop when the deployment meets its business goal in production.",
  note:"Needs customer infra + [NAME]."},

 {id:"002",name:"Architecture Satisfaction",cat:"Repo & Release Hygiene",tier:"B",mode:"self",uatt:false,
  prompt:"/loop Refactor the codebase one step at a time. After each change, run the tests and self-review the diff. Track progress in ARCHITECTURE_PROGRESS.md. Stop when the architecture is satisfactory and all checks pass.",
  note:""},
 {id:"012",name:"Repository Cleanup",cat:"Repo & Release Hygiene",tier:"B",mode:"self",uatt:false,
  prompt:"/loop Inspect branches, pull requests, commits, and worktrees. Recover any valuable unmerged work and remove stale items, showing evidence for each removal. Stop when the repository state is intentional.",
  note:"Run inside a git repo."},
 {id:"013",name:"Stale-Safe Batch Release",cat:"Repo & Release Hygiene",tier:"B",mode:"self",uatt:false,
  prompt:"/loop Review all pending changes, exclude anything incomplete, and combine the valid, complete changes into a single release. Stop when only current, complete changes are staged to ship.",
  note:""},
 {id:"016",name:"Ticket-to-PR-Ready",cat:"Repo & Release Hygiene",tier:"C",mode:"self",uatt:false,
  prompt:"/loop Take bug report [TICKET]. Reproduce the failure, isolate the root cause, and apply the smallest credible fix. Produce: failure summary, reproduction steps, root cause, fix summary, files changed, verification proof, risks, follow-ups, suggested PR title, and PR description draft. Stop when the patch is review-ready.",
  note:"Fill [TICKET]. Usually one-shot; point at 'the next open bug labeled X' to loop a queue."},
 {id:"020",name:"Loop Harness Verification",cat:"Repo & Release Hygiene",tier:"C",mode:"1h",uatt:true,
  prompt:"/loop 1h Do the next unit of work in an isolated git worktree. Then, in a separate verification pass, check the output against the defined criteria. Ship only output that is independently verified.",
  note:"Approximates Berman's full worker+verifier harness — use Routines/Desktop for the real thing."},

 {id:"006",name:"SEO/GEO Visibility",cat:"Discovery & Visual",tier:"B",mode:"self",uatt:false,
  prompt:"/loop Audit the site for crawlability, indexation, content structure, and search rankings. Prioritize fixes by impact, apply the top one, and re-run the benchmark. Stop when priority pages are indexable, answer-ready, and technically sound.",
  note:"Run against a live site."},
 {id:"021",name:"Boeing 747 Benchmark",cat:"Discovery & Visual",tier:"B",mode:"self",uatt:false,
  prompt:"/loop Improve the Three.js model of a Boeing 747. After each change, render the standard camera-inspection views and compare against reference photos. Stop when you are 100% satisfied with the visual realism.",
  note:"Needs a Three.js project."},
 {id:"022",name:"Autonomous Frontend Designer",cat:"Discovery & Visual",tier:"C",mode:"self",uatt:false,
  prompt:"/loop Capture the design from [URL or image]. Produce both a static and a coded build, then measure each against the original across design, motion, and responsiveness. Stop when the builds match the reference across every measured fidelity axis.",
  note:"Needs a way to capture the reference (browser/screenshot MCP or an image)."},
];

const byId = Object.fromEntries(LOOPS.map(l=>[l.id,l]));
const modeLabel = m => m==="self" ? "self-paced" : "every "+m;

/* ---------- copy ---------- */
function copy(id,btn){
  const txt = byId[id].prompt;
  const done = ()=>{toast(); if(btn){btn.classList.add("done");const t=btn.textContent;btn.textContent="✓ Copied";setTimeout(()=>{btn.classList.remove("done");btn.textContent=t;},1200);}};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done,fallback);}
  else fallback();
  function fallback(){const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}ta.remove();done();}
}
let toastT;
function toast(){const t=document.getElementById("toast");t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),900);}

const meta = l => `<span class="chip">${modeLabel(l.mode)}</span>`+(l.uatt?`<span class="chip uatt">⟳ Routines</span>`:"");
const HOW = `<details class="how"><summary>▸ How loops work — scheduling & self-pacing</summary>
  <table>
   <tr><th></th><th>Cloud (Routines)</th><th>Desktop task</th><th>/loop (in-session)</th></tr>
   <tr><td>Machine on / session open</td><td>Neither</td><td>Machine on</td><td>Both</td></tr>
   <tr><td>Persists / no expiry</td><td>Yes</td><td>Yes</td><td>7-day expiry</td></tr>
   <tr><td>Local files</td><td>No (fresh clone)</td><td>Yes</td><td>Yes</td></tr>
  </table>
  <p><b>Self-paced</b> (no interval): Claude does a chunk, picks its own gap (1m–1h) based on whether work remains, and <b>stops itself</b> when the goal is met. Use for every "Stop when X" loop.
  <b>Fixed interval</b> (<code>1d</code>, <code>30m</code>): polls on a clock, never self-stops. <b>⟳ Routines</b> = wants unattended/overnight running — back it with a cloud Routine.</p>
  <p>Clock times aren't a /loop option — ask in natural language: <i>"every day at 3am, …"</i></p>
</details>`;

/* ===================== A: CARD GRID ===================== */
function renderA(){
  const root=document.getElementById("A");
  root.innerHTML=`<div class="wrap">
    <h1>Berman's Loop Library</h1>
    <p class="sub">22 paste-ready <code>/loop</code> prompts — concepts by Matt Berman, prompts here.</p>
    ${HOW}
    <div class="bar" id="barA">
      <input type="search" placeholder="Search loops…" oninput="filterA()">
      <span class="flt A" data-f="tier" data-v="A" onclick="tg(this);filterA()">Tier A</span>
      <span class="flt B" data-f="tier" data-v="B" onclick="tg(this);filterA()">Tier B</span>
      <span class="flt C" data-f="tier" data-v="C" onclick="tg(this);filterA()">Tier C</span>
      <span class="flt" data-f="mode" data-v="self" onclick="tg(this);filterA()">Self-paced</span>
      <span class="flt" data-f="mode" data-v="int" onclick="tg(this);filterA()">Interval</span>
      <span class="flt" data-f="uatt" data-v="1" onclick="tg(this);filterA()">⟳ Unattended</span>
    </div>
    ${CATS.map(c=>`
      <div class="cat" data-cat="${c}">
        <div class="cat-h">${c}</div>
        <div class="grid">
        ${LOOPS.filter(l=>l.cat===c).map(l=>`
          <div class="card" data-id="${l.id}" data-tier="${l.tier}" data-mode="${l.mode==='self'?'self':'int'}" data-uatt="${l.uatt?1:0}" data-txt="${(l.id+' '+l.name).toLowerCase()}">
            <div class="top"><span class="id">${l.id}</span><span class="nm">${l.name}</span><span class="tier ${l.tier}">${l.tier}</span></div>
            <div class="meta">${meta(l)}</div>
            <pre class="cmd">${l.prompt}</pre>
            ${l.note?`<div class="note">${l.note}</div>`:""}
            <div class="foot"><button class="copy" onclick="copy('${l.id}',this)">📋 Copy</button></div>
          </div>`).join("")}
        </div>
      </div>`).join("")}
  </div>`;
}
function tg(el){el.classList.toggle("on");}
function filterA(){
  const bar=document.getElementById("barA");
  const q=bar.querySelector("input").value.trim().toLowerCase();
  const on=f=>[...bar.querySelectorAll(`.flt.on[data-f="${f}"]`)].map(e=>e.dataset.v);
  const tiers=on("tier"),modes=on("mode"),uatt=on("uatt");
  document.querySelectorAll("#A .card").forEach(c=>{
    const ok=(!tiers.length||tiers.includes(c.dataset.tier))
      &&(!modes.length||modes.includes(c.dataset.mode))
      &&(!uatt.length||c.dataset.uatt==="1")
      &&(!q||c.dataset.txt.includes(q));
    c.classList.toggle("hidden",!ok);
  });
  document.querySelectorAll("#A .cat").forEach(cat=>{
    const any=[...cat.querySelectorAll(".card")].some(c=>!c.classList.contains("hidden"));
    cat.classList.toggle("hidden",!any);
  });
}

/* ===================== B: SIDEBAR EXPLORER ===================== */
function renderB(){
  const root=document.getElementById("B");
  root.innerHTML=`<div class="wrap">
    <h1>Loop Library — explorer</h1>
    <p class="sub">Browse by domain on the left; the prompt opens on the right.</p>
    <div class="ex">
      <div class="side">
        <input type="search" placeholder="Filter…" oninput="filterB(this.value)">
        ${CATS.map(c=>`<div class="grp" data-grp="${c}">${c}</div>
          ${LOOPS.filter(l=>l.cat===c).map(l=>`
            <div class="item" data-id="${l.id}" data-txt="${(l.id+' '+l.name).toLowerCase()}" onclick="selB('${l.id}',this)">
              <span class="id">${l.id}</span><span>${l.name}</span><span class="tier ${l.tier}" style="margin-left:auto">${l.tier}</span>
            </div>`).join("")}`).join("")}
      </div>
      <div class="main" id="mainB"></div>
    </div>
  </div>`;
  selB(LOOPS[0].id, root.querySelector(".item"));
}
function selB(id,el){
  document.querySelectorAll("#B .item").forEach(i=>i.classList.remove("on"));
  if(el)el.classList.add("on");
  const l=byId[id];
  document.getElementById("mainB").innerHTML=`
    <div style="color:var(--dim);font:600 12px var(--mono)">${l.cat} · ${l.id}</div>
    <h2>${l.name} <span class="tier ${l.tier}">${l.tier}</span></h2>
    <div class="meta">${meta(l)}</div>
    <pre class="cmd">${l.prompt}</pre>
    <button class="copy" onclick="copy('${l.id}',this)">📋 Copy prompt</button>
    ${l.note?`<div class="note" style="margin-top:14px">ℹ️ ${l.note}</div>`:""}`;
}
function filterB(q){
  q=q.trim().toLowerCase();
  document.querySelectorAll("#B .item").forEach(i=>i.classList.toggle("hidden",q&&!i.dataset.txt.includes(q)));
  document.querySelectorAll("#B .grp").forEach(g=>{
    let n=g.nextElementSibling,any=false;
    while(n&&n.classList.contains("item")){if(!n.classList.contains("hidden"))any=true;n=n.nextElementSibling;}
    g.classList.toggle("hidden",!any);
  });
}

/* ===================== C: ACCORDION ===================== */
function renderC(){
  const root=document.getElementById("C");
  root.innerHTML=`<div class="wrap"><div class="col">
    <h1>Loop Library</h1>
    <p class="sub">Skim every loop; expand one to grab the prompt.</p>
    ${HOW}
    <div class="bar" id="barC">
      <input type="search" placeholder="Search…" oninput="filterC()">
      <span class="flt A" data-v="A" onclick="tg(this);filterC()">A</span>
      <span class="flt B" data-v="B" onclick="tg(this);filterC()">B</span>
      <span class="flt C" data-v="C" onclick="tg(this);filterC()">C</span>
    </div>
    ${CATS.map(c=>`<div class="accg" data-cat="${c}">
      <div class="acc-h">${c}</div>
      ${LOOPS.filter(l=>l.cat===c).map(l=>`
        <details class="row" data-tier="${l.tier}" data-txt="${(l.id+' '+l.name).toLowerCase()}">
          <summary><span class="caret">▸</span><span class="id">${l.id}</span><span class="nm">${l.name}</span>
            ${l.uatt?`<span class="chip uatt">⟳</span>`:""}<span class="chip">${modeLabel(l.mode)}</span><span class="tier ${l.tier}">${l.tier}</span></summary>
          <div class="body">
            <pre class="cmd">${l.prompt}</pre>
            ${l.note?`<div class="note">${l.note}</div>`:""}
            <div style="margin-top:8px"><button class="copy" onclick="copy('${l.id}',this)">📋 Copy</button></div>
          </div>
        </details>`).join("")}
    </div>`).join("")}
  </div></div>`;
}
function filterC(){
  const bar=document.getElementById("barC");
  const q=bar.querySelector("input").value.trim().toLowerCase();
  const tiers=[...bar.querySelectorAll(".flt.on")].map(e=>e.dataset.v);
  document.querySelectorAll("#C .row").forEach(r=>{
    const ok=(!tiers.length||tiers.includes(r.dataset.tier))&&(!q||r.dataset.txt.includes(q));
    r.classList.toggle("hidden",!ok);
  });
  document.querySelectorAll("#C .accg").forEach(g=>{
    const any=[...g.querySelectorAll(".row")].some(r=>!r.classList.contains("hidden"));
    g.classList.toggle("hidden",!any);
  });
}

/* ---------- tab switch ---------- */
document.querySelectorAll(".switch button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll(".switch button").forEach(x=>x.classList.remove("on"));
