name: Sync Loop Library

on:
  schedule:
    - cron: "0 9 * * 1"      # every Monday 09:00 UTC
  workflow_dispatch:          # ...and a manual "Run workflow" button

# What the job's token may do: commit a branch + open a PR (contents, pull-requests),
# fetch an OIDC token during auth (id-token), and open an issue if the run fails (issues).
permissions:
  contents: write
  pull-requests: write
  id-token: write
  issues: write

# Don't let two syncs run at once (avoids duplicate PRs).
concurrency:
  group: sync-loops
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Run the sync agent
        # Pinned to an immutable commit SHA (supply-chain hardening) since this step
        # receives the CLAUDE_CODE_OAUTH_TOKEN. Re-pin after reviewing changelogs (Dependabot).
        uses: anthropics/claude-code-action@521136812280ae7ef256e06045655b9da02793f0  # v1
        with:
          # Auth via your Claude Max subscription — NO per-token API billing.
          # Generate with `claude setup-token`, store as the CLAUDE_CODE_OAUTH_TOKEN secret.
          # (Swap for `anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}` to bill the API instead.)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Read .claude/sync-loops.md and follow it exactly."
          claude_args: "--max-turns 40"     # safety cap on agent iterations

      # If anything above failed, file an issue so you hear about it (email + repo).
      - name: Open an issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body=$(printf 'The scheduled Loop Library sync workflow failed.\n\nRun log: %s\n\nCheck the failing step, fix it, then re-run with the **Run workflow** button.' "$run_url")
          gh issue create \
            --title "⚠️ Loop Library sync failed (run ${{ github.run_id }})" \
            --body "$body"
